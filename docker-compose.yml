services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        # Empty string = nginx proxies API calls to the backend container.
        # Override with the actual backend public URL when deploying without nginx proxy.
        VITE_BACKEND_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - backend
