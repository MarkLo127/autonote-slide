server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls and static storage to the backend service.
    # proxy_buffering off is required for NDJSON streaming to work correctly.
    location ~ ^/(analyze|health|storage|assets) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
